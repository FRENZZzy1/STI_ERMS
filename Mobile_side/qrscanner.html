<body>
  <div class="scanner-container">
    <div class="scanner-header">
      <h2>📷 QR Code Scanner</h2>

    </div>
    
    <video id="video"></video>
    <div id="result" class="scanning">Scanning...</div>
    
    <form id="scanForm" method="POST" action="output.php">
      <input type="hidden" id="barcodeInput" name="barcode" value="">
    </form>
    
    <div class="button-group">
      <button type="button" id="backBtn">← Back</button>
    </div>
  </div>

  <script>
    const resultElement = document.getElementById('result');
    const barcodeInput = document.getElementById('barcodeInput');
    const scanForm = document.getElementById('scanForm');
    const backBtn = document.getElementById('backBtn');
    let scannedCode = null;

    // Back button - return to previous page
    backBtn.addEventListener('click', () => {
      window.history.back();
    });

    // Wait until the ZXing script is ready
    window.addEventListener('load', () => {
      const codeReader = new ZXing.BrowserMultiFormatReader();
      const videoElement = document.getElementById('video');

      async function startScanner() {
        try {
          const devices = await codeReader.listVideoInputDevices();

          if (devices.length === 0) {
            resultElement.textContent = "❌ No camera found";
            resultElement.classList.remove('scanning');
            resultElement.classList.add('error');
            return;
          }

          // Pick the back camera if available
          const backCamera = devices.find(device =>
            device.label.toLowerCase().includes('back')
          ) || devices[0];

          // Start scanning
          await codeReader.decodeFromVideoDevice(backCamera.deviceId, videoElement, (result, err) => {
            if (result) {
              // Code scanned successfully
              scannedCode = result.text;
              barcodeInput.value = scannedCode;
              
              resultElement.textContent = "✅ QR Code: " + scannedCode;
              resultElement.classList.remove('scanning');
              resultElement.classList.add('success');
              
              // Auto-submit form after 1 second
              setTimeout(() => {
                scanForm.submit();
              }, 1000);
              
              // Stop scanning after successful scan
              codeReader.reset();
            } else if (err && !(err instanceof ZXing.NotFoundException)) {
              console.error(err);
            }
          });
        } catch (error) {
          resultElement.textContent = "❌ Error: " + error.message;
          resultElement.classList.remove('scanning');
          resultElement.classList.add('error');
          console.error(error);
        }
      }

      startScanner();
    });
  </script>
</body>
